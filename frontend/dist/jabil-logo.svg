<svg viewBox="210 118 1180 260" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Jabil Logo</title>
  <desc id="desc">High contrast JABIL logo with transparent background</desc>
  <defs>
    <linearGradient id="letterFill" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.55" stop-color="#f7fbff"/>
      <stop offset="1" stop-color="#d8e6f7"/>
    </linearGradient>
    <filter id="logoShadow" x="-8%" y="-20%" width="116%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#001b3d" flood-opacity="0.42"/>
    </filter>
    <style>
      .word {
        font-family: Arial Black, Arial, Helvetica, sans-serif;
        font-weight: 900;
        letter-spacing: 14px;
      }
    </style>
  </defs>
  <g filter="url(#logoShadow)">
    <text x="245" y="328" class="word" font-size="270" fill="url(#letterFill)" stroke="#062d63" stroke-width="12" paint-order="stroke fill">JABIL</text>
  </g>
</svg>
